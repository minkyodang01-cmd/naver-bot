name: Ping Render

on:
  schedule:
    - cron: '2-59/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping /wake 5 times
        run: |
          for i in 1 2 3 4 5
          do
            echo "PING $i"
            code=$(curl -L -s -o /dev/null -w "%{http_code}" https://naver-bot-1-24jt.onrender.com/wake)
            echo "HTTP $code"
            sleep 2
          done
