name: Ping Render

on:
  schedule:
    - cron: '2-59/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping multiple times (강제 깨우기)
        run: |
          for i in {1..5}
          do
            echo "PING $i"
            curl -L -s -o /dev/null -w "%{http_code}\n" https://naver-bot-1-24jt.onrender.com/wake
            sleep 2
          done
